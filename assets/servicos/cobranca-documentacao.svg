<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Documentação empresarial com cláusula destacada">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#2a221a"/>
      <stop offset="55%" stop-color="#14110b"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1c15"/>
      <stop offset="100%" stop-color="#141109"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c09030" fill-opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Documento principal, levemente inclinado -->
  <g transform="translate(210,95) rotate(-3)">
    <!-- Sombra -->
    <rect x="12" y="14" width="340" height="440" rx="6" fill="#000" fill-opacity="0.5"/>
    <!-- Papel -->
    <rect x="0" y="0" width="340" height="440" rx="6" fill="url(#paper)" stroke="#c09030" stroke-opacity="0.35" stroke-width="1"/>

    <!-- Cabeçalho: título + subtítulo -->
    <rect x="30" y="38" width="180" height="6" rx="2" fill="url(#gold)"/>
    <rect x="30" y="54" width="120" height="3" rx="1.5" fill="#a09880" fill-opacity="0.5"/>

    <!-- Linhas de texto do corpo -->
    <g fill="#a09880" fill-opacity="0.45">
      <rect x="30" y="90" width="280" height="2.5" rx="1"/>
      <rect x="30" y="104" width="275" height="2.5" rx="1"/>
      <rect x="30" y="118" width="260" height="2.5" rx="1"/>
      <rect x="30" y="132" width="245" height="2.5" rx="1"/>
    </g>

    <!-- Cláusula destacada (marca-texto gold) -->
    <rect x="22" y="160" width="296" height="72" rx="4" fill="#c09030" fill-opacity="0.14"/>
    <rect x="22" y="160" width="3" height="72" fill="url(#gold)"/>
    <g fill="#d4a84a" fill-opacity="0.92">
      <rect x="30" y="176" width="270" height="3" rx="1.5"/>
      <rect x="30" y="190" width="255" height="3" rx="1.5"/>
      <rect x="30" y="204" width="240" height="3" rx="1.5"/>
      <rect x="30" y="218" width="210" height="3" rx="1.5"/>
    </g>

    <!-- Linhas de texto depois da cláusula -->
    <g fill="#a09880" fill-opacity="0.45">
      <rect x="30" y="258" width="275" height="2.5" rx="1"/>
      <rect x="30" y="272" width="260" height="2.5" rx="1"/>
      <rect x="30" y="286" width="270" height="2.5" rx="1"/>
      <rect x="30" y="300" width="230" height="2.5" rx="1"/>
    </g>

    <!-- Assinatura -->
    <line x1="30" y1="360" x2="170" y2="360" stroke="#a09880" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="30" y="370" width="90" height="2" rx="1" fill="#a09880" fill-opacity="0.3"/>

    <!-- Carimbo/selo OAB -->
    <g transform="translate(250,355)" filter="url(#glow)">
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-opacity="0.85"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="0" y="-4" text-anchor="middle" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="11" font-weight="700" letter-spacing="1.5">OAB</text>
      <text x="0" y="10" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="6" letter-spacing="1.4" opacity="0.7">REGISTRO</text>
    </g>
  </g>

  <!-- Caneta elegante -->
  <g transform="translate(495,390) rotate(-28)">
    <!-- Corpo da caneta -->
    <rect x="0" y="-4" width="150" height="8" rx="2" fill="#1a1812" stroke="#c09030" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="0" y="-4" width="150" height="8" rx="2" fill="url(#gold)" fill-opacity="0.08"/>
    <!-- Ponta -->
    <polygon points="0,0 -16,-6 -14,0 -16,6" fill="url(#gold)"/>
    <!-- Detalhe dourado -->
    <rect x="80" y="-5" width="24" height="10" fill="url(#gold)" opacity="0.55"/>
    <!-- Aba -->
    <rect x="60" y="-5" width="3" height="10" fill="#0b0a08"/>
  </g>

  <!-- Traço da caneta (linha de assinatura sinuosa) -->
  <path d="M 480 380 Q 520 370, 560 385 T 640 390" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7" stroke-dasharray="2 3"/>

  <!-- Glow de destaque atrás do documento -->
  <circle cx="400" cy="320" r="280" fill="url(#gold)" fill-opacity="0.03"/>
</svg>
