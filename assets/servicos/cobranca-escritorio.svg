<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ambiente de escritório empresarial noturno">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14110b"/>
      <stop offset="60%" stop-color="#1a1610"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <radialGradient id="spot" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c09030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c09030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldWindow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
  </defs>

  <!-- Céu/fundo -->
  <rect width="1600" height="500" fill="url(#skyGrad)"/>
  <rect width="1600" height="500" fill="url(#spot)"/>

  <!-- Grid de pontos sutil -->
  <g fill="#c09030" fill-opacity="0.06">
    <circle cx="100" cy="80" r="1"/><circle cx="200" cy="60" r="1"/><circle cx="350" cy="90" r="1"/>
    <circle cx="500" cy="70" r="1"/><circle cx="650" cy="50" r="1"/><circle cx="800" cy="80" r="1"/>
    <circle cx="950" cy="60" r="1"/><circle cx="1100" cy="90" r="1"/><circle cx="1250" cy="70" r="1"/>
    <circle cx="1400" cy="85" r="1"/><circle cx="1500" cy="55" r="1"/>
  </g>

  <!-- Skyline / edifícios ao fundo -->
  <g fill="#1a1812" stroke="#c09030" stroke-opacity="0.12" stroke-width="0.5">
    <rect x="80" y="200" width="110" height="260"/>
    <rect x="220" y="180" width="90" height="280"/>
    <rect x="330" y="220" width="140" height="240"/>
    <rect x="490" y="160" width="100" height="300"/>
    <rect x="1040" y="170" width="110" height="290"/>
    <rect x="1170" y="200" width="130" height="260"/>
    <rect x="1320" y="150" width="90" height="310"/>
    <rect x="1430" y="190" width="120" height="270"/>
  </g>

  <!-- Janelas acesas (gold) dos edifícios -->
  <g fill="url(#goldWindow)" fill-opacity="0.55">
    <!-- Left skyline -->
    <rect x="95" y="220" width="8" height="12"/><rect x="115" y="220" width="8" height="12"/><rect x="135" y="220" width="8" height="12"/>
    <rect x="95" y="250" width="8" height="12"/><rect x="155" y="250" width="8" height="12"/>
    <rect x="115" y="280" width="8" height="12"/><rect x="135" y="280" width="8" height="12"/>
    <rect x="95" y="310" width="8" height="12"/><rect x="155" y="310" width="8" height="12"/>

    <rect x="235" y="200" width="8" height="12"/><rect x="255" y="200" width="8" height="12"/><rect x="275" y="200" width="8" height="12"/>
    <rect x="235" y="230" width="8" height="12"/><rect x="295" y="230" width="8" height="12"/>
    <rect x="255" y="260" width="8" height="12"/><rect x="275" y="260" width="8" height="12"/>

    <rect x="345" y="240" width="10" height="14"/><rect x="375" y="240" width="10" height="14"/><rect x="405" y="240" width="10" height="14"/><rect x="435" y="240" width="10" height="14"/>
    <rect x="345" y="280" width="10" height="14"/><rect x="435" y="280" width="10" height="14"/>
    <rect x="375" y="320" width="10" height="14"/><rect x="405" y="320" width="10" height="14"/>

    <rect x="505" y="180" width="8" height="12"/><rect x="525" y="180" width="8" height="12"/><rect x="565" y="180" width="8" height="12"/>
    <rect x="505" y="220" width="8" height="12"/><rect x="545" y="220" width="8" height="12"/>
    <rect x="525" y="260" width="8" height="12"/><rect x="565" y="260" width="8" height="12"/>

    <rect x="1055" y="190" width="8" height="12"/><rect x="1085" y="190" width="8" height="12"/><rect x="1115" y="190" width="8" height="12"/>
    <rect x="1055" y="230" width="8" height="12"/><rect x="1115" y="230" width="8" height="12"/>

    <rect x="1185" y="220" width="10" height="14"/><rect x="1215" y="220" width="10" height="14"/><rect x="1245" y="220" width="10" height="14"/><rect x="1275" y="220" width="10" height="14"/>
    <rect x="1185" y="260" width="10" height="14"/><rect x="1275" y="260" width="10" height="14"/>

    <rect x="1335" y="170" width="8" height="12"/><rect x="1365" y="170" width="8" height="12"/><rect x="1395" y="170" width="8" height="12"/>
    <rect x="1335" y="210" width="8" height="12"/><rect x="1395" y="210" width="8" height="12"/>
    <rect x="1365" y="250" width="8" height="12"/><rect x="1395" y="250" width="8" height="12"/>

    <rect x="1445" y="210" width="10" height="14"/><rect x="1475" y="210" width="10" height="14"/><rect x="1525" y="210" width="10" height="14"/>
    <rect x="1445" y="250" width="10" height="14"/><rect x="1505" y="250" width="10" height="14"/>
  </g>

  <!-- Janela grande em destaque — "o escritório" -->
  <g transform="translate(620,80)">
    <!-- Moldura -->
    <rect x="0" y="0" width="360" height="320" fill="#0b0a08" stroke="url(#goldWindow)" stroke-width="1.5" stroke-opacity="0.8"/>
    <!-- Cruzeta -->
    <line x1="180" y1="0" x2="180" y2="320" stroke="url(#goldWindow)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="0" y1="160" x2="360" y2="160" stroke="url(#goldWindow)" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Luz interna -->
    <rect x="1" y="1" width="178" height="158" fill="url(#goldWindow)" fill-opacity="0.28"/>
    <rect x="181" y="1" width="178" height="158" fill="url(#goldWindow)" fill-opacity="0.22"/>
    <rect x="1" y="161" width="178" height="158" fill="url(#goldWindow)" fill-opacity="0.18"/>
    <rect x="181" y="161" width="178" height="158" fill="url(#goldWindow)" fill-opacity="0.25"/>

    <!-- Silhueta de mesa + monitor dentro da janela -->
    <g opacity="0.5">
      <rect x="60" y="220" width="240" height="6" fill="#0b0a08"/>
      <rect x="100" y="180" width="70" height="42" fill="#0b0a08"/>
      <rect x="104" y="184" width="62" height="34" fill="url(#goldWindow)" fill-opacity="0.8"/>
      <rect x="128" y="224" width="14" height="6" fill="#0b0a08"/>
      <!-- Cadeira -->
      <rect x="200" y="180" width="4" height="50" fill="#0b0a08"/>
      <rect x="185" y="230" width="34" height="4" fill="#0b0a08"/>
    </g>
  </g>

  <!-- Chão / reflexo -->
  <rect y="460" width="1600" height="40" fill="url(#goldWindow)" fill-opacity="0.02"/>
  <line x1="0" y1="460" x2="1600" y2="460" stroke="url(#goldWindow)" stroke-width="1" stroke-opacity="0.2"/>
</svg>
