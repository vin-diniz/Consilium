<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Documento de planejamento sucessório empresarial com árvore genealógica e cláusulas de sucessão">
  <defs>
    <radialGradient id="bgPS" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#2a221a"/>
      <stop offset="55%" stop-color="#14110b"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </radialGradient>
    <linearGradient id="goldPS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="paperPS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1c15"/>
      <stop offset="100%" stop-color="#141109"/>
    </linearGradient>
    <pattern id="dotsPS" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c09030" fill-opacity="0.12"/>
    </pattern>
    <filter id="glowPS">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgPS)"/>
  <rect width="800" height="600" fill="url(#dotsPS)"/>
  <circle cx="400" cy="300" r="280" fill="url(#goldPS)" fill-opacity="0.03"/>

  <!-- Documento principal -->
  <g transform="translate(160,75)">
    <rect x="12" y="14" width="360" height="480" rx="6" fill="#000" fill-opacity="0.55"/>
    <rect x="0" y="0" width="360" height="480" rx="6" fill="url(#paperPS)" stroke="#c09030" stroke-opacity="0.35" stroke-width="1"/>

    <!-- Título -->
    <text x="180" y="42" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="12" font-weight="700" letter-spacing="2">PLANEJAMENTO</text>
    <text x="180" y="58" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="12" font-weight="700" letter-spacing="2">SUCESSÓRIO EMPRESARIAL</text>
    <line x1="70" y1="68" x2="290" y2="68" stroke="url(#goldPS)" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Seção 1: Herdeiros -->
    <text x="30" y="98" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">HERDEIROS E SUCESSORES</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="112" width="290" height="2.5" rx="1"/>
      <rect x="30" y="124" width="280" height="2.5" rx="1"/>
      <rect x="30" y="136" width="260" height="2.5" rx="1"/>
    </g>

    <!-- Seção 2: Doação com reserva de usufruto (destacada) -->
    <text x="30" y="172" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">DOAÇÃO COM RESERVA DE USUFRUTO</text>
    <rect x="22" y="182" width="316" height="68" rx="4" fill="#c09030" fill-opacity="0.14"/>
    <rect x="22" y="182" width="3" height="68" fill="url(#goldPS)"/>
    <g fill="#d4a84a" fill-opacity="0.9">
      <rect x="30" y="194" width="290" height="3" rx="1.5"/>
      <rect x="30" y="208" width="275" height="3" rx="1.5"/>
      <rect x="30" y="222" width="260" height="3" rx="1.5"/>
      <rect x="30" y="236" width="220" height="3" rx="1.5"/>
    </g>

    <!-- Seção 3: Holding patrimonial -->
    <text x="30" y="278" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">HOLDING PATRIMONIAL</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="292" width="290" height="2.5" rx="1"/>
      <rect x="30" y="304" width="270" height="2.5" rx="1"/>
      <rect x="30" y="316" width="280" height="2.5" rx="1"/>
    </g>

    <!-- Seção 4: Governança -->
    <text x="30" y="348" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">PROTOCOLO FAMILIAR</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="362" width="280" height="2.5" rx="1"/>
      <rect x="30" y="374" width="260" height="2.5" rx="1"/>
    </g>

    <!-- Assinatura do instituidor -->
    <line x1="100" y1="420" x2="260" y2="420" stroke="url(#goldPS)" stroke-width="1" stroke-opacity="0.7"/>
    <!-- Rubrica -->
    <path d="M 130 414 Q 150 404, 170 418 T 210 412 Q 225 418, 240 412" stroke="url(#goldPS)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <text x="180" y="436" text-anchor="middle" fill="#a09880" fill-opacity="0.55" font-family="sans-serif" font-size="7" letter-spacing="1.5">INSTITUIDOR · SUCESSÃO</text>
  </g>

  <!-- Árvore genealógica à direita -->
  <g transform="translate(580,130)" filter="url(#glowPS)">
    <!-- Patriarca no topo -->
    <circle cx="0" cy="0" r="22" fill="url(#paperPS)" stroke="url(#goldPS)" stroke-width="1.8"/>
    <text x="0" y="4" text-anchor="middle" fill="#e8c870" font-family="sans-serif" font-size="10" font-weight="700">P</text>
    <text x="0" y="-32" text-anchor="middle" fill="#a09880" font-family="sans-serif" font-size="6" letter-spacing="1.2">PATRIARCA</text>

    <!-- Conexões descendentes -->
    <line x1="0" y1="22" x2="0" y2="55" stroke="url(#goldPS)" stroke-width="1.3" stroke-opacity="0.6"/>
    <line x1="-65" y1="55" x2="65" y2="55" stroke="url(#goldPS)" stroke-width="1.3" stroke-opacity="0.6"/>
    <line x1="-65" y1="55" x2="-65" y2="85" stroke="url(#goldPS)" stroke-width="1.3" stroke-opacity="0.6"/>
    <line x1="0" y1="55" x2="0" y2="85" stroke="url(#goldPS)" stroke-width="1.3" stroke-opacity="0.6"/>
    <line x1="65" y1="55" x2="65" y2="85" stroke="url(#goldPS)" stroke-width="1.3" stroke-opacity="0.6"/>

    <!-- Três herdeiros -->
    <circle cx="-65" cy="108" r="18" fill="url(#paperPS)" stroke="#c09030" stroke-width="1.3" stroke-opacity="0.7"/>
    <text x="-65" y="112" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="8" font-weight="700">H1</text>

    <circle cx="0" cy="108" r="18" fill="url(#paperPS)" stroke="#c09030" stroke-width="1.3" stroke-opacity="0.7"/>
    <text x="0" y="112" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="8" font-weight="700">H2</text>

    <circle cx="65" cy="108" r="18" fill="url(#paperPS)" stroke="#c09030" stroke-width="1.3" stroke-opacity="0.7"/>
    <text x="65" y="112" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="8" font-weight="700">H3</text>

    <text x="0" y="142" text-anchor="middle" fill="#a09880" font-family="sans-serif" font-size="6" letter-spacing="1.2">HERDEIROS</text>

    <!-- Linhas descendo para participações societárias -->
    <line x1="-65" y1="126" x2="-65" y2="160" stroke="url(#goldPS)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
    <line x1="0" y1="126" x2="0" y2="160" stroke="url(#goldPS)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
    <line x1="65" y1="126" x2="65" y2="160" stroke="url(#goldPS)" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>

    <!-- Participações (quadrados indicando quotas) -->
    <rect x="-75" y="160" width="20" height="20" fill="url(#goldPS)" fill-opacity="0.3" stroke="url(#goldPS)" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="-10" y="160" width="20" height="20" fill="url(#goldPS)" fill-opacity="0.3" stroke="url(#goldPS)" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="55" y="160" width="20" height="20" fill="url(#goldPS)" fill-opacity="0.3" stroke="url(#goldPS)" stroke-width="1" stroke-opacity="0.6"/>
    <text x="0" y="200" text-anchor="middle" fill="#a09880" font-family="sans-serif" font-size="6" letter-spacing="1.2">QUOTAS / HOLDING</text>
  </g>

  <!-- Carimbo sucessão planejada -->
  <g transform="translate(580,450)" filter="url(#glowPS)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#goldPS)" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle cx="0" cy="0" r="29" fill="none" stroke="url(#goldPS)" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="7" font-weight="700" letter-spacing="1">SUCESSÃO</text>
    <text x="0" y="6" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="7" font-weight="700" letter-spacing="1">PLANEJADA</text>
    <text x="0" y="17" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="5" letter-spacing="1.5" opacity="0.7">CÓDIGO CIVIL</text>
  </g>
</svg>
