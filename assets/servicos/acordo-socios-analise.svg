<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Documento de acordo de sócios com múltiplas assinaturas e carimbo de registro">
  <defs>
    <radialGradient id="bgS" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#2a221a"/>
      <stop offset="55%" stop-color="#14110b"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </radialGradient>
    <linearGradient id="goldS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="paperS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1c15"/>
      <stop offset="100%" stop-color="#141109"/>
    </linearGradient>
    <pattern id="dotsS" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c09030" fill-opacity="0.12"/>
    </pattern>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgS)"/>
  <rect width="800" height="600" fill="url(#dotsS)"/>
  <circle cx="400" cy="300" r="280" fill="url(#goldS)" fill-opacity="0.03"/>

  <!-- Documento: ACORDO DE SÓCIOS -->
  <g transform="translate(180,80)">
    <rect x="12" y="14" width="360" height="470" rx="6" fill="#000" fill-opacity="0.55"/>
    <rect x="0" y="0" width="360" height="470" rx="6" fill="url(#paperS)" stroke="#c09030" stroke-opacity="0.35" stroke-width="1"/>

    <!-- Título -->
    <text x="180" y="46" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="13" font-weight="700" letter-spacing="2.5">ACORDO DE SÓCIOS</text>
    <line x1="90" y1="56" x2="270" y2="56" stroke="url(#goldS)" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Partes -->
    <text x="30" y="92" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">SÓCIO 1 · QUOTISTA MAJORITÁRIO</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="106" width="280" height="2.5" rx="1"/>
      <rect x="30" y="118" width="260" height="2.5" rx="1"/>
    </g>
    <text x="30" y="148" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">SÓCIO 2 · QUOTISTA MINORITÁRIO</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="162" width="280" height="2.5" rx="1"/>
      <rect x="30" y="174" width="250" height="2.5" rx="1"/>
    </g>

    <!-- Cláusula destacada: Direito de preferência -->
    <text x="30" y="212" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">CLÁUSULA · DIREITO DE PREFERÊNCIA</text>
    <rect x="22" y="220" width="316" height="72" rx="4" fill="#c09030" fill-opacity="0.14"/>
    <rect x="22" y="220" width="3" height="72" fill="url(#goldS)"/>
    <g fill="#d4a84a" fill-opacity="0.9">
      <rect x="30" y="232" width="290" height="3" rx="1.5"/>
      <rect x="30" y="246" width="275" height="3" rx="1.5"/>
      <rect x="30" y="260" width="260" height="3" rx="1.5"/>
      <rect x="30" y="274" width="230" height="3" rx="1.5"/>
    </g>

    <!-- Tag along / Drag along -->
    <text x="30" y="312" fill="#d4a84a" font-family="'Playfair Display', serif" font-size="9" font-weight="600" letter-spacing="1.4">TAG ALONG · DRAG ALONG</text>
    <g fill="#a09880" fill-opacity="0.42">
      <rect x="30" y="326" width="280" height="2.5" rx="1"/>
      <rect x="30" y="338" width="265" height="2.5" rx="1"/>
      <rect x="30" y="350" width="275" height="2.5" rx="1"/>
    </g>

    <!-- Duas linhas de assinatura (paridade visual entre sócios) -->
    <g transform="translate(0,390)">
      <line x1="40" y1="0" x2="155" y2="0" stroke="url(#goldS)" stroke-width="1" stroke-opacity="0.7"/>
      <line x1="205" y1="0" x2="320" y2="0" stroke="url(#goldS)" stroke-width="1" stroke-opacity="0.7"/>
      <!-- Rubrica 1 -->
      <path d="M 60 -5 Q 75 -15, 90 -2 T 125 -8" stroke="url(#goldS)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
      <!-- Rubrica 2 -->
      <path d="M 220 -5 Q 240 -18, 260 -4 T 300 -10" stroke="url(#goldS)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
      <text x="97" y="14" text-anchor="middle" fill="#a09880" fill-opacity="0.6" font-family="sans-serif" font-size="6" letter-spacing="1.2">SÓCIO 1</text>
      <text x="262" y="14" text-anchor="middle" fill="#a09880" fill-opacity="0.6" font-family="sans-serif" font-size="6" letter-spacing="1.2">SÓCIO 2</text>
    </g>
  </g>

  <!-- Carimbo Junta Comercial -->
  <g transform="translate(560,410)" filter="url(#glowS)">
    <circle cx="0" cy="0" r="44" fill="none" stroke="url(#goldS)" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#goldS)" stroke-width="0.8" stroke-opacity="0.55"/>
    <text x="0" y="-8" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="8" font-weight="700" letter-spacing="1.2">JUNTA</text>
    <text x="0" y="3" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="8" font-weight="700" letter-spacing="1.2">COMERCIAL</text>
    <text x="0" y="16" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="5" letter-spacing="1.8" opacity="0.7">REGISTRO</text>
  </g>

  <!-- Dois círculos representando os sócios, conectados -->
  <g transform="translate(580,130)" opacity="0.85">
    <circle cx="0" cy="0" r="24" fill="url(#paperS)" stroke="url(#goldS)" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="11" font-weight="700">S1</text>
    <circle cx="70" cy="0" r="24" fill="url(#paperS)" stroke="url(#goldS)" stroke-width="1.5"/>
    <text x="70" y="5" text-anchor="middle" fill="#d4a84a" font-family="sans-serif" font-size="11" font-weight="700">S2</text>
    <!-- Conexão -->
    <line x1="24" y1="0" x2="46" y2="0" stroke="url(#goldS)" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="35" y="-10" text-anchor="middle" fill="#a09880" font-family="sans-serif" font-size="6" letter-spacing="1">QUOTAS</text>
  </g>
</svg>
