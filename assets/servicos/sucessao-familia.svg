<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fundador empresário reunido com herdeiros em planejamento sucessório familiar">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1610"/>
      <stop offset="60%" stop-color="#14110b"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <radialGradient id="spotF" cx="50%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#c09030" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c09030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deskF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#14110b"/>
    </linearGradient>
    <linearGradient id="goldF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="personF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1c15"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bgF)"/>
  <rect width="1600" height="500" fill="url(#spotF)"/>

  <!-- Grid sutil -->
  <g fill="#c09030" fill-opacity="0.07">
    <circle cx="100" cy="50" r="1"/><circle cx="280" cy="40" r="1"/><circle cx="460" cy="70" r="1"/>
    <circle cx="640" cy="45" r="1"/><circle cx="820" cy="60" r="1"/><circle cx="1000" cy="50" r="1"/>
    <circle cx="1180" cy="70" r="1"/><circle cx="1360" cy="45" r="1"/><circle cx="1500" cy="60" r="1"/>
  </g>

  <!-- Parede arquitetônica sutil -->
  <line x1="0" y1="230" x2="1600" y2="230" stroke="url(#goldF)" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- Quadro/arte no fundo (símbolo de legado) -->
  <g transform="translate(720,80)" opacity="0.4">
    <rect x="0" y="0" width="160" height="110" rx="2" fill="none" stroke="url(#goldF)" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="8" y="8" width="144" height="94" fill="url(#goldF)" fill-opacity="0.06"/>
    <!-- Árvore genealógica estilizada no quadro -->
    <circle cx="80" cy="35" r="8" fill="none" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="80" y1="43" x2="80" y2="60" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="50" y1="60" x2="110" y2="60" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="50" y1="60" x2="50" y2="75" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="80" y1="60" x2="80" y2="75" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="110" y1="60" x2="110" y2="75" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="50" cy="83" r="6" fill="none" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="80" cy="83" r="6" fill="none" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="110" cy="83" r="6" fill="none" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- Mesa longa -->
  <ellipse cx="800" cy="420" rx="740" ry="60" fill="url(#deskF)" stroke="url(#goldF)" stroke-width="1.5" stroke-opacity="0.5"/>
  <ellipse cx="800" cy="420" rx="640" ry="42" fill="url(#goldF)" fill-opacity="0.04"/>

  <!-- HERDEIRA 1 (esquerda) -->
  <g transform="translate(180,170)">
    <circle cx="70" cy="45" r="30" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.5" stroke-width="1.2"/>
    <path d="M 10 200 Q 10 105, 70 96 Q 130 105, 130 200 Z" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.4" stroke-width="1"/>
    <path d="M 47 105 L 70 125 L 93 105 L 82 148 L 58 148 Z" fill="#0b0a08"/>
    <polygon points="68,125 72,125 77,190 63,190" fill="url(#goldF)" fill-opacity="0.5"/>
  </g>

  <!-- HERDEIRO 2 (entre herdeira e patriarca) -->
  <g transform="translate(440,175)">
    <circle cx="70" cy="45" r="30" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.5" stroke-width="1.2"/>
    <path d="M 10 200 Q 10 105, 70 96 Q 130 105, 130 200 Z" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.4" stroke-width="1"/>
    <path d="M 47 105 L 70 125 L 93 105 L 82 148 L 58 148 Z" fill="#0b0a08"/>
    <polygon points="68,125 72,125 77,190 63,190" fill="url(#goldF)" fill-opacity="0.5"/>
  </g>

  <!-- PATRIARCA / FUNDADOR (centro — em destaque) -->
  <g transform="translate(720,140)" filter="url(#glowP)">
    <defs>
      <filter id="glowP" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Halo sutil -->
    <circle cx="80" cy="52" r="48" fill="url(#goldF)" fill-opacity="0.08"/>
    <circle cx="80" cy="52" r="38" fill="url(#personF)" stroke="url(#goldF)" stroke-opacity="0.85" stroke-width="1.8"/>
    <!-- Traços de cabelo grisalho (fundador) -->
    <path d="M 50 42 Q 55 30, 80 26 Q 105 30, 110 42" stroke="#e8c870" stroke-width="1.2" stroke-opacity="0.4" fill="none"/>
    <path d="M 50 38 Q 65 33, 80 32" stroke="#e8c870" stroke-width="1" stroke-opacity="0.3" fill="none"/>
    <!-- Corpo -->
    <path d="M 0 230 Q 0 115, 80 105 Q 160 115, 160 230 Z" fill="url(#personF)" stroke="url(#goldF)" stroke-opacity="0.55" stroke-width="1.2"/>
    <!-- Terno -->
    <path d="M 54 115 L 80 138 L 106 115 L 93 160 L 67 160 Z" fill="#0b0a08"/>
    <!-- Gravata dourada -->
    <polygon points="77,138 83,138 88,210 72,210" fill="url(#goldF)" fill-opacity="0.75"/>
    <!-- Detalhe: broche/pin -->
    <circle cx="96" cy="152" r="2" fill="url(#goldF)"/>
  </g>

  <!-- HERDEIRO 3 (direita) -->
  <g transform="translate(1040,175)">
    <circle cx="70" cy="45" r="30" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.5" stroke-width="1.2"/>
    <path d="M 10 200 Q 10 105, 70 96 Q 130 105, 130 200 Z" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.4" stroke-width="1"/>
    <path d="M 47 105 L 70 125 L 93 105 L 82 148 L 58 148 Z" fill="#0b0a08"/>
    <polygon points="68,125 72,125 77,190 63,190" fill="url(#goldF)" fill-opacity="0.5"/>
  </g>

  <!-- HERDEIRA 4 (extremo direito) -->
  <g transform="translate(1300,170)">
    <circle cx="70" cy="45" r="30" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.5" stroke-width="1.2"/>
    <path d="M 10 200 Q 10 105, 70 96 Q 130 105, 130 200 Z" fill="url(#personF)" stroke="#c09030" stroke-opacity="0.4" stroke-width="1"/>
    <path d="M 47 105 L 70 125 L 93 105 L 82 148 L 58 148 Z" fill="#0b0a08"/>
    <polygon points="68,125 72,125 77,190 63,190" fill="url(#goldF)" fill-opacity="0.5"/>
  </g>

  <!-- Linhas de conexão (legado passando) -->
  <g stroke="url(#goldF)" stroke-width="0.8" stroke-dasharray="3 4" stroke-opacity="0.28" fill="none">
    <path d="M 250 290 Q 400 260, 510 300"/>
    <path d="M 510 300 Q 650 270, 800 195"/>
    <path d="M 800 195 Q 950 270, 1110 300"/>
    <path d="M 1110 300 Q 1240 260, 1370 290"/>
  </g>

  <!-- Documento central (plano sucessório) -->
  <g transform="translate(720,395)">
    <rect x="6" y="6" width="170" height="45" fill="#0b0a08" fill-opacity="0.6"/>
    <rect x="0" y="0" width="170" height="45" rx="2" fill="#1f1c15" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.7"/>
    <text x="85" y="16" text-anchor="middle" fill="#e8c870" font-family="'Playfair Display', serif" font-size="8" font-weight="700" letter-spacing="1.3">PLANO SUCESSÓRIO</text>
    <line x1="14" y1="24" x2="156" y2="24" stroke="url(#goldF)" stroke-opacity="0.5" stroke-width="0.8"/>
    <line x1="14" y1="32" x2="140" y2="32" stroke="#a09880" stroke-opacity="0.4" stroke-width="0.7"/>
    <line x1="14" y1="38" x2="130" y2="38" stroke="#a09880" stroke-opacity="0.4" stroke-width="0.7"/>
  </g>

  <!-- Canecas/copos de café em alguns pontos da mesa -->
  <g opacity="0.45">
    <rect x="280" y="395" width="40" height="20" rx="2" fill="#1f1c15" stroke="#c09030" stroke-opacity="0.4" stroke-width="0.6"/>
    <rect x="520" y="395" width="40" height="20" rx="2" fill="#1f1c15" stroke="#c09030" stroke-opacity="0.4" stroke-width="0.6"/>
    <rect x="1050" y="395" width="40" height="20" rx="2" fill="#1f1c15" stroke="#c09030" stroke-opacity="0.4" stroke-width="0.6"/>
    <rect x="1320" y="395" width="40" height="20" rx="2" fill="#1f1c15" stroke="#c09030" stroke-opacity="0.4" stroke-width="0.6"/>
  </g>
</svg>
