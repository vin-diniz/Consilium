<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Caneta assinando contrato empresarial">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1610"/>
      <stop offset="60%" stop-color="#14110b"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <radialGradient id="spotA" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c09030" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c09030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="paperA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#201d16"/>
      <stop offset="100%" stop-color="#14110b"/>
    </linearGradient>
    <filter id="penShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feOffset dx="0" dy="6" in="b" result="o"/>
      <feComponentTransfer in="o" result="t"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="t"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bgA)"/>
  <rect width="1600" height="420" fill="url(#spotA)"/>

  <!-- Grid sutil -->
  <g fill="#c09030" fill-opacity="0.07">
    <circle cx="100" cy="60" r="1"/><circle cx="300" cy="40" r="1"/><circle cx="500" cy="70" r="1"/>
    <circle cx="800" cy="50" r="1"/><circle cx="1100" cy="45" r="1"/><circle cx="1300" cy="60" r="1"/>
    <circle cx="200" cy="180" r="1"/><circle cx="400" cy="200" r="1"/>
    <circle cx="1400" cy="180" r="1"/><circle cx="1500" cy="160" r="1"/>
  </g>

  <!-- Papel grande (contrato sendo assinado) -->
  <g transform="translate(180,80)">
    <!-- Sombra -->
    <rect x="12" y="14" width="1240" height="280" fill="#000" fill-opacity="0.5"/>
    <!-- Papel -->
    <rect x="0" y="0" width="1240" height="280" rx="4" fill="url(#paperA)" stroke="#c09030" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Título no topo -->
    <rect x="40" y="32" width="280" height="6" rx="2" fill="url(#goldA)"/>

    <!-- Linhas de texto -->
    <g fill="#a09880" fill-opacity="0.38">
      <rect x="40" y="60" width="1160" height="3" rx="1.5"/>
      <rect x="40" y="74" width="1140" height="3" rx="1.5"/>
      <rect x="40" y="88" width="1120" height="3" rx="1.5"/>
      <rect x="40" y="102" width="1160" height="3" rx="1.5"/>
      <rect x="40" y="116" width="1080" height="3" rx="1.5"/>
      <rect x="40" y="130" width="1140" height="3" rx="1.5"/>
      <rect x="40" y="144" width="1100" height="3" rx="1.5"/>
    </g>

    <!-- Divisor -->
    <line x1="40" y1="180" x2="1200" y2="180" stroke="url(#goldA)" stroke-opacity="0.3" stroke-width="0.8"/>

    <!-- Linha de assinatura -->
    <line x1="260" y1="230" x2="720" y2="230" stroke="#a09880" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="490" y="248" text-anchor="middle" fill="#a09880" fill-opacity="0.55" font-family="sans-serif" font-size="9" letter-spacing="2">ASSINATURA DA CONTRATADA</text>

    <!-- Segunda linha de assinatura -->
    <line x1="800" y1="230" x2="1180" y2="230" stroke="#a09880" stroke-opacity="0.3" stroke-width="1.2"/>
    <text x="990" y="248" text-anchor="middle" fill="#a09880" fill-opacity="0.5" font-family="sans-serif" font-size="9" letter-spacing="2">CONTRATANTE</text>
  </g>

  <!-- Assinatura em rubrica (desenho sobre a linha) -->
  <g transform="translate(450,260)" stroke="url(#goldA)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M 0 50 Q 20 20, 45 35 T 90 30 Q 110 20, 130 45 Q 145 60, 170 30 T 220 40"/>
    <path d="M 70 58 L 175 58" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- Caneta em destaque (na posição de assinar) -->
  <g transform="translate(635,215) rotate(-18)" filter="url(#penShadow)">
    <!-- Tampa -->
    <rect x="-30" y="-8" width="30" height="16" rx="2" fill="#1a1812" stroke="#c09030" stroke-opacity="0.5" stroke-width="1"/>
    <!-- Corpo principal da caneta -->
    <rect x="0" y="-8" width="210" height="16" rx="3" fill="#1f1c15" stroke="url(#goldA)" stroke-width="1.2" stroke-opacity="0.85"/>
    <!-- Textura / padrão sutil -->
    <rect x="0" y="-8" width="210" height="16" rx="3" fill="url(#goldA)" fill-opacity="0.1"/>
    <!-- Clipe lateral -->
    <rect x="30" y="-12" width="4" height="18" fill="url(#goldA)" opacity="0.85"/>
    <!-- Anel dourado decorativo -->
    <rect x="160" y="-10" width="14" height="20" fill="url(#goldA)"/>
    <rect x="163" y="-10" width="1.5" height="20" fill="#0b0a08"/>
    <rect x="170" y="-10" width="1.5" height="20" fill="#0b0a08"/>
    <!-- Corpo da ponta -->
    <polygon points="210,-8 232,-4 240,0 232,4 210,8" fill="#1a1812" stroke="url(#goldA)" stroke-width="0.8" stroke-opacity="0.7"/>
    <!-- Aparo (gold) -->
    <polygon points="235,-3 250,0 235,3" fill="url(#goldA)"/>
    <!-- Ponto da ponta -->
    <circle cx="252" cy="0" r="1.5" fill="url(#goldA)"/>
  </g>

  <!-- Brilho do ponto de contato caneta-papel -->
  <g transform="translate(893,253)">
    <circle cx="0" cy="0" r="16" fill="url(#goldA)" fill-opacity="0.2"/>
    <circle cx="0" cy="0" r="6" fill="url(#goldA)" fill-opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#e8c870"/>
  </g>
</svg>
